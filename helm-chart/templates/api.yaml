apiVersion: apps/v1
kind: Deployment
metadata:
  name: package-tracker-api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: package-tracker-api
  template:
    metadata:
      labels:
        app: package-tracker-api
    spec:
      containers:
      - name: api
        image: {{ .Values.api.image }}
        imagePullPolicy: Never 
        ports:
        - containerPort: 3000
        resources:
{{ toYaml .Values.api.resources | indent 12 }} # 10 or 12
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/packages"
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: package-tracker-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
